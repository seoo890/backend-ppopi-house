#server.headers.frame-options=sameorigin

# 1. H2 콘솔 활성화 (반드시 true여야 함)
spring.h2.console.enabled=true

# 2. 콘솔 접속 경로 (기본값이지만 명시적으로 설정)
spring.h2.console.path=/h2-console


# 3. DB 연결 정보 (로그에 찍힌 URL과 일치해야 함)
spring.datasource.url=jdbc:h2:mem:ppopidb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 4. [중요] H2 콘솔은 프레임(Frame) 구조를 사용하므로 보안 설정을 확인해야 함
# 만약 나중에 Spring Security를 추가한다면 이 부분이 문제가 됩니다.
# 현재는 Security가 없으므로 아래 설정 없이도 떠야 정상입니다.